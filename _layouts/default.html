<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'ko-KR' }}">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 | escape }}" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
    {% seo %}
    {%- feed_meta -%}
  </head>
  <body>
    <header class="site-header">
      <div class="container header-row">
        <div class="brand-group">
          <a class="brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
          <p class="brand-tagline">AI 자동화, 문서 제작, 작업 노트를 다시 꺼내 쓸 수 있게 정리하는 실전 개발 블로그</p>
        </div>
        <nav class="nav-links">
          <a href="{{ '/' | relative_url }}">Home</a>
          <a href="{{ '/about/' | relative_url }}">About</a>
          <a href="{{ '/#topics' | relative_url }}">Topics</a>
          <a href="{{ '/#recommended' | relative_url }}">Recommended</a>
          <a href="https://github.com/songseungyul/Code25Y">GitHub</a>
        </nav>
      </div>
    </header>

    <main>
      {{ content }}
    </main>

    <footer class="site-footer">
      <div class="container footer-row">
        <p>{{ site.title }} · 짧아도 다음 작업에서 바로 다시 쓸 수 있는 기록을 남깁니다.</p>
        <p><a href="https://github.com/songseungyul">GitHub</a></p>
      </div>
    </footer>
  </body>
</html>
