<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'ko-KR' }}">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 | escape }}" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
    {% seo %}
    {%- feed_meta -%}
  </head>
  <body>
    <div class="site-shell">
      <header class="site-header">
        <div class="container nav-row">
          <a class="brand" href="{{ '/' | relative_url }}">
            <span class="brand-mark">C25</span>
            <span>
              <strong>{{ site.title }}</strong>
              <small>Senior Engineering Notes</small>
            </span>
          </a>
          <nav class="nav-links">
            <a href="{{ '/' | relative_url }}">Home</a>
            <a href="{{ '/about/' | relative_url }}">About</a>
            <a href="{{ '/#writing' | relative_url }}">Writing</a>
            <a href="https://github.com/songseungyul/Code25Y">GitHub</a>
          </nav>
        </div>
      </header>

      <main>
        {{ content }}
      </main>

      <footer class="site-footer">
        <div class="container footer-grid">
          <div>
            <p class="eyebrow">Code25Y</p>
            <p class="footer-copy">실무에서 오래 남는 설계, 운영, 자동화, 제품 개발의 기준을 기록합니다.</p>
          </div>
          <div>
            <p class="footer-heading">Focus</p>
            <ul class="footer-list">
              <li>Architecture</li>
              <li>AI Workflow</li>
              <li>Developer Productivity</li>
            </ul>
          </div>
          <div>
            <p class="footer-heading">Links</p>
            <ul class="footer-list">
              <li><a href="{{ '/about/' | relative_url }}">About</a></li>
              <li><a href="{{ '/#writing' | relative_url }}">Latest Posts</a></li>
              <li><a href="https://github.com/songseungyul">GitHub Profile</a></li>
            </ul>
          </div>
        </div>
      </footer>
    </div>
  </body>
</html>
